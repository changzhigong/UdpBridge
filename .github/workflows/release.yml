name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ==================== PC 端构建 ====================
  pc-build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Compile LodopUdpBridge JAR
        shell: cmd
        run: |
          cd installer
          javac --release 17 -encoding UTF-8 -d lodop ..\LodopUdpBridge.java
          jar cfe LodopUdpBridge.jar LodopUdpBridge -C lodop .
          dir LodopUdpBridge.jar

      - name: Compile UniversalPrintBridge JAR
        shell: cmd
        run: |
          javac -cp "lib/pdfbox-2.0.30.jar;lib/fontbox-2.0.30.jar;lib/commons-logging-1.2.jar" --release 17 -encoding UTF-8 -d installer\univ UniversalPrintBridge.java
          cd installer
          jar cfe UniversalPrintBridge.jar UniversalPrintBridge -C univ .
          dir UniversalPrintBridge.jar
          mkdir lib 2>nul
          copy ..\lib\pdfbox-2.0.30.jar lib\
          copy ..\lib\fontbox-2.0.30.jar lib\
          copy ..\lib\commons-logging-1.2.jar lib\
          copy ..\run_universal_bridge.bat run_universal.bat

      - name: Generate JRE
        shell: cmd
        run: |
          cd installer
          jlink --add-modules java.base,java.datatransfer,java.xml,java.prefs,java.desktop,java.logging,java.net.http --output jre --strip-debug --no-header-files --no-man-pages --compress=2
          dir jre\bin\javaw.exe

      - name: Bundle LibreOffice (portable, for Office→PDF conversion)
        shell: powershell
        run: |
          $ver = "26.2.4"
          $url = "https://download.documentfoundation.org/libreoffice/stable/$ver/win/x86_64/LibreOffice_${ver}_Win_x86-64.msi"
          $msi = "installer\LibreOffice.msi"
          $target = Join-Path $PWD "installer\LibreOffice"
          Write-Host "Downloading LibreOffice $ver ..."
          # 用 curl 下载: 原生支持断点续传(-C -)与失败自动重试(--retry), 规避海外大文件传输偶发断流
          # WindowsPowerShell 5.1 的 Invoke-WebRequest 无重试参数, 单点抖动即整构建失败
          $ok = $false
          for ($i = 1; $i -le 6; $i++) {
            try {
              Write-Host "Download attempt $i/6 ..."
              curl.exe -L --retry 5 --retry-all-errors --retry-delay 5 -C - -o $msi $url
              if (Test-Path $msi -and (Get-Item $msi).Length -gt 100MB) { $ok = $true; break }
              Write-Host "MSI size too small, retrying"
            } catch {
              Write-Host "Download attempt $i failed: $_"
              Start-Sleep -Seconds 3
            }
          }
          if (-not $ok) { throw "LibreOffice download failed after 6 attempts" }
          Write-Host "Download OK: $([math]::Round((Get-Item $msi).Length/1MB, 1)) MB"
          Write-Host "Extracting via msiexec /a to $target ..."
          $p = Start-Process msiexec.exe -ArgumentList "/a","$msi","TARGETDIR=$target","/qn" -Wait -PassThru
          if ($p.ExitCode -ne 0) { throw "msiexec /a failed: $($p.ExitCode)" }
          Remove-Item $msi -Force
          if (Test-Path "$target\program\soffice.exe") { Write-Host "LibreOffice bundled OK" } else { throw "soffice.exe not found after extraction" }

      - name: Compile Inno Setup
        shell: powershell
        run: |
          Set-Location installer
          $iscc = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) {
            Write-Host "Inno Setup not found, installing via choco..."
            choco install innosetup -y --no-progress
            $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          }
          Write-Host "Using ISCC: $iscc"
          & $iscc "LodopUdpBridge.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed" }

      - name: Verify artifact
        shell: powershell
        run: |
          $exe = "installer\installer-output\LodopUdpBridge_Setup.exe"
          if (-not (Test-Path $exe)) { throw "Setup.exe not found" }
          Write-Host "Setup.exe: $([math]::Round((Get-Item $exe).Length/1MB, 2)) MB"

      - name: Upload PC artifact
        uses: actions/upload-artifact@v4
        with:
          name: pc-setup
          path: installer/installer-output/LodopUdpBridge_Setup.exe
          retention-days: 30

  # ==================== Android 端构建 ====================
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android-print-terminal/app/fycrg-app-release-key.keystore
            echo "Keystore decoded"
          else
            echo "WARNING: KEYSTORE_BASE64 not set, APK will be unsigned"
          fi

      - name: Generate Gradle wrapper
        working-directory: android-print-terminal
        run: gradle wrapper --gradle-version 8.7

      - name: Build signed APK
        working-directory: android-print-terminal
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/android-print-terminal/app/fycrg-app-release-key.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Find APK
        id: apk
        run: |
          APK=$(find android-print-terminal -name "*.apk" | grep -v unsigned | head -1)
          if [ -z "$APK" ]; then
            APK=$(find android-print-terminal -name "*.apk" | head -1)
          fi
          echo "apk=$APK" >> $GITHUB_OUTPUT
          echo "APK: $APK"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ steps.apk.outputs.apk }}
          retention-days: 30

  # ==================== 创建 Release ====================
  release:
    needs: [pc-build, android-build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download PC artifact
        uses: actions/download-artifact@v4
        with:
          name: pc-setup

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk

      - name: List artifacts
        run: ls -la *.exe *.apk 2>/dev/null || echo "Checking files..."; ls -la

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Creating release for tag: $TAG"
          FILES=$(ls *.exe *.apk 2>/dev/null | tr '\n' ' ')
          if [ -z "$FILES" ]; then
            echo "ERROR: no release files found"
            exit 1
          fi
          gh release create "$TAG" $FILES --repo changzhigong/UdpBridge --generate-notes --title "LodopUdpBridge $TAG"
